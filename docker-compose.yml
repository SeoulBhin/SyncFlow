services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: syncflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncflow
      POSTGRES_PASSWORD: syncflow1234
      POSTGRES_DB: syncflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: syncflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
