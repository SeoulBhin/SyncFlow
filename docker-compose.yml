services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: syncflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: syncflow
      POSTGRES_PASSWORD: syncflow1234
      POSTGRES_DB: syncflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: syncflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: syncflow-livekit
    restart: unless-stopped
    ports:
      - '7880:7880'   # HTTP / WebSocket
      - '7881:7881'   # RTC over TCP
      - '50000-50200:50000-50200/udp'  # RTC over UDP (media)
    environment:
      - LIVEKIT_CONFIG=/etc/livekit/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit/livekit.yaml:ro

volumes:
  postgres_data:
  redis_data:
